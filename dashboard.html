<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex">

<!-- Sidebar -->
<div class="w-64 bg-gray-800 min-h-screen p-6 flex flex-col">

<h2 class="text-2xl font-bold text-blue-400 mb-10">
SmartNews
</h2>
<p class="text-gray-400 mb-6">Welcome, <span id="userEmail"></span></p>

<nav class="flex flex-col space-y-6 text-gray-300 flex-grow">

<a href="dashboard.html" class="text-blue-400 font-semibold">
Dashboard
</a>

<a href="admin.html" class="hover:text-blue-400">
Manage Articles
</a>

<a href="analytics.html" class="hover:text-blue-400">
Analytics
</a>

<a href="profile.html" class="hover:text-blue-400">
Profile
</a>

</nav>

<button onclick="logout()"
class="bg-red-500 hover:bg-red-600 p-3 rounded-lg">

Logout

</button>

</div>


<!-- Main Content -->
<div class="flex-1 p-12">

<h1 class="text-4xl font-semibold mb-10">
Welcome to Your Personalized Feed
</h1>

<h2 class="text-blue-400 text-2xl mb-6 font-semibold">
Today's Headlines
</h2>

<div id="todaySection"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mb-14">
</div>


<h2 class="text-green-400 text-2xl mb-6 font-semibold">
Recommended For You ⭐
</h2>

<div id="recommendedSection"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
</div>

</div>


<script>
// authentication guard
if(!localStorage.getItem("loggedUser")){
    window.location.href = "index.html";
}
</script>
<script src="data/articles.js"></script>
<script src="js/dashboard.js"></script>

<script>
function logout(){
    // remove only login info, keep preferences and activity for next login
    localStorage.removeItem("loggedUser");
    localStorage.removeItem("role");
    window.location.href="index.html";
}
</script>

</body>
</html>
